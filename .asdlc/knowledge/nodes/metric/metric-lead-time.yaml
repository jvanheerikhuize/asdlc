id: metric-lead-time
type: metric
title: "Lead time — change opened to merged"
since: "2026-07-14"
body: |2
  Time from the Change Record being opened (`change.json` `opened_at`,
  the declared start of a new change) to the change landing on `main`
  (the commit that adds its Change Record to the default branch).
  Calendar time, deliberately: nights, waiting, and manual repo work all
  count, because this measures request-to-delivery of a governed change
  at the merge boundary — not agent effort, which is
  [[metric-cycle-time]]'s job. Extends to the deploy boundary when G5
  exists (slice 4).

  **Derived, never stored** (D9 applied to numbers): computed on demand by
  `spec/tools/metrics.py` from the evidence bundle plus git history — there
  is no metrics database to drift from reality. Caveats: the merge
  timestamp is the commit that added `change.json` on the current branch
  (matches the squash-merge flow); in-flight changes are excluded; the
  2026-07-14 records carry hand-authored, future-skewed `opened_at`
  timestamps, so their lead times are negative — kept as the honest
  record that motivated [[leftover-change-scaffolder]].

  **Chart vs. summary treatment differ** (per
  [[roadmap-priority-2-metrics-integrity]]'s n/a-for-inaccurate-data
  request): a negative lead time is arithmetically impossible for a real
  opened-to-merge measurement, so it's flagged programmatically
  (`lead_time_s < 0`). The chart still plots the raw negative bar — it's
  the honest historical record of the timestamp bug. The table and
  markdown summary render those rows as "n/a" instead, since a negative
  duration isn't a meaningful answer to "how long did this take," and the
  median-lead tile excludes them so one bad row can't drag the summary
  figure negative. The chart's axis is capped at the p90 so a single
  overnight outlier can't squash the sub-hour majority; capped bars run
  to the plot edge behind an axis-break chevron with the exact value
  labeled on the bar.

  **History**: v1 (2026-07-14, [[roadmap-slice-1b-first-merge]]) measured
  from the recorded intent (`change-intent/v1` `produced_at`) instead of
  `opened_at`. The two timestamps sit minutes apart in practice, which
  made lead and the old cycle time near-identical and the dashboard
  unreadable; [[roadmap-priority-4-agent-cycle-time]] moved the start to
  `opened_at` ("starting a new change", the owner's definition) and gave
  cycle time to the agent-effort dimension.
